<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lion Mining – Viagens</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:10px}
.wrap{max-width:520px;margin:0 auto;background:#fff;border-radius:15px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:18px;text-align:center}
.header h1{font-size:22px;margin-bottom:2px}
.header p{font-size:12px;opacity:.85}
.syncbar{background:#1a1a2e;color:#fff;font-size:11px;padding:7px 14px;display:flex;align-items:center;gap:8px;min-height:30px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:.3s}
.dot.ok{background:#4caf50}.dot.busy{background:#ffc107;animation:blink .7s infinite}.dot.err{background:#f44336}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.tabs{display:flex;background:#f8f9fa;border-bottom:2px solid #eee}
.tb{flex:1;padding:11px 2px;background:none;border:none;cursor:pointer;font-weight:600;font-size:11px;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}
.tb.on{color:#667eea;border-bottom-color:#667eea;background:#fff}
.pane{display:none;padding:18px}.pane.on{display:block}
.fg{margin-bottom:13px}
label{display:block;margin-bottom:5px;font-weight:600;color:#333;font-size:13px}
input{width:100%;padding:11px;border:2px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;transition:.2s}
input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;transition:.2s;margin-top:7px}
.bp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.bp:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(102,126,234,.35)}
.bp:disabled{opacity:.5;cursor:not-allowed;transform:none}
.bs{background:#eee;color:#333}.bd{background:#ff4757;color:#fff}
.alert{padding:11px;border-radius:8px;margin-bottom:12px;font-size:13px;font-weight:500}
.as{background:#d4edda;color:#155724}.ae{background:#f8d7da;color:#721c24}
.card{background:#f8f9fa;border-left:4px solid #667eea;padding:12px;margin-bottom:10px;border-radius:6px;font-size:12px}
.card.pend{background:#fff9e6;border-left-color:#ffc107}
.ch{font-weight:700;color:#333;font-size:13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.ci{background:#fff;padding:6px;border-radius:4px}
.cl{color:#888;font-size:11px}.cv{color:#333;font-weight:600;margin-top:2px}
.badge{padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.bok{background:#d4edda;color:#155724}.bwarn{background:#fff3cd;color:#856404}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:14px;border-radius:8px;text-align:center}
.sl{font-size:11px;opacity:.85;margin-bottom:4px}.sv{font-size:26px;font-weight:700}
.empty{text-align:center;padding:36px 20px;color:#aaa}.ei{font-size:44px;margin-bottom:8px}
.srch{margin-bottom:12px}
.frow{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.fb{padding:5px 12px;border:2px solid #ddd;background:#fff;border-radius:20px;cursor:pointer;font-size:12px;white-space:nowrap}
.fb.on{background:#667eea;color:#fff;border-color:#667eea}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal.open{display:flex}
.mbox{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto}
.mcl{float:right;font-size:22px;cursor:pointer;color:#aaa;line-height:1}
.ib{padding:11px;border-radius:8px;margin-bottom:12px;font-size:12px}
.iblue{background:#e7f3ff;color:#0066cc}.iyellow{background:#fff3cd;color:#856404}
.note{font-size:11px;color:#999;margin-top:4px}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #ddd;border-top-color:#667eea;border-radius:50%;animation:sp .7s linear infinite;margin-right:5px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><h1>🚚 LION MINING</h1><p>Registro de Viagens — Base Compartilhada</p></div>
  <div class="syncbar"><div class="dot busy" id="sdot"></div><span id="smsg">Conectando…</span></div>
  <div class="tabs">
    <button class="tb on" onclick="goTab('ent',this)">📥 Entrada</button>
    <button class="tb"    onclick="goTab('sai',this)">📤 Saída</button>
    <button class="tb"    onclick="goTab('his',this)">📋 Histórico</button>
    <button class="tb"    onclick="goTab('sta',this)">📊 Stats</button>
    <button class="tb"    onclick="goTab('exp',this)">💾 Export</button>
  </div>

  <div id="ent" class="pane on">
    <div id="aent"></div>
    <div class="ib iblue">✅ Registre a chegada do caminhão ao pátio</div>
    <div class="fg"><label>🔶 Placa *</label><input id="eplaca" placeholder="Ex: QXJ9H00" maxlength="10" style="text-transform:uppercase"></div>
    <div class="row2">
      <div class="fg"><label>📅 Data *</label><input type="date" id="edata"></div>
      <div class="fg"><label>🕐 Hora *</label><input type="time" id="ehora"></div>
    </div>
    <div class="fg"><label>📝 Nota</label><input id="enota" placeholder="Opcional…"></div>
    <button class="btn bp" id="bentrada" onclick="registrarEntrada()">✅ Registrar Entrada</button>
    <button class="btn bs" onclick="limparEntrada()">🔄 Limpar</button>
    <p style="font-size:11px;color:#999;text-align:center;margin-top:10px">🌐 Firebase — dados compartilhados em tempo real</p>
  </div>

  <div id="sai" class="pane">
    <div id="asai"></div>
    <div class="ib iyellow">⚠️ Selecione o caminhão e registre a saída</div>
    <div class="srch"><input id="ssai" placeholder="🔍 Buscar placa…" oninput="renderPend()"></div>
    <div id="pendlist"></div>
  </div>

  <div id="his" class="pane">
    <div class="srch"><input id="shis" placeholder="🔍 Buscar placa…" oninput="renderHist()"></div>
    <div class="frow">
      <button class="fb on" onclick="setFil('todos',this)">Todos</button>
      <button class="fb"    onclick="setFil('hoje',this)">Hoje</button>
      <button class="fb"    onclick="setFil('semana',this)">7 dias</button>
      <button class="fb"    onclick="setFil('mes',this)">30 dias</button>
      <button class="fb"    onclick="setFil('dia',this)">📅 Dia</button>
    </div>
    <div id="hist-date-box" style="display:none;margin-bottom:12px">
      <input type="date" id="hist-data" oninput="renderHist()">
    </div>
    <div id="histlist"></div>
  </div>

  <div id="sta" class="pane">
    <div class="fg" style="margin-bottom:14px">
      <label>📅 Filtrar por dia</label>
      <input type="date" id="stats-data" oninput="renderStats()">
      <button class="btn bs" onclick="document.getElementById('stats-data').value='';renderStats()" style="margin-top:6px;padding:8px;font-size:12px">🔄 Todos os dias</button>
    </div>
    <div id="statsbox"></div>
  </div>

  <div id="exp" class="pane">
    <div class="ib iblue"><strong>📊 Exportar</strong></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="btn bp" onclick="expCSV()">📥 CSV</button>
      <button class="btn bp" onclick="expXLSX()">📥 Excel</button>
    </div>
    <button class="btn bd" onclick="clearAll()" style="margin-top:16px">🗑️ Limpar Todos os Dados</button>
  </div>
</div>

<!-- MODAL SAÍDA -->
<div class="modal" id="msai">
  <div class="mbox">
    <span class="mcl" onclick="closeModal()">✕</span>
    <h2 style="margin-bottom:14px;color:#333">📤 Registrar Saída</h2>
    <div id="minfo" class="ib iblue"></div>
    <div class="fg"><label>📅 Data Saída *</label><input type="date" id="mdata"></div>
    <div class="fg"><label>🕐 Hora Saída *</label><input type="time" id="mhora"></div>
    <div class="fg"><label>⚖️ Peso (kg)</label><input type="number" id="mpeso" step="100" min="0"></div>
    <div class="fg"><label>📝 Nota</label><input id="mnota"></div>
    <div class="ib iblue">⏱️ Tempo: <strong id="mtempo">--</strong> min</div>
    <button class="btn bp" id="bsai" onclick="confirmarSaida()">✅ Confirmar Saída</button>
    <button class="btn bs" onclick="closeModal()" style="margin-top:6px">❌ Cancelar</button>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal" id="medit">
  <div class="mbox">
    <span class="mcl" onclick="closeEditModal()">✕</span>
    <h2 style="margin-bottom:14px;color:#333">✏️ Editar Viagem</h2>
    <div class="fg"><label>🔶 Placa *</label><input id="ed-placa" maxlength="10" style="text-transform:uppercase"></div>
    <div class="row2">
      <div class="fg"><label>📅 Data Chegada *</label><input type="date" id="ed-dch"></div>
      <div class="fg"><label>🕐 Hora Chegada *</label><input type="time" id="ed-hch"></div>
    </div>
    <div class="row2">
      <div class="fg"><label>📅 Data Saída *</label><input type="date" id="ed-dsa"></div>
      <div class="fg"><label>🕐 Hora Saída *</label><input type="time" id="ed-hsa"></div>
    </div>
    <div class="fg"><label>⚖️ Peso (kg)</label><input type="number" id="ed-peso" step="100" min="0"></div>
    <div class="fg"><label>📝 Nota Entrada</label><input id="ed-nent"></div>
    <div class="fg"><label>📝 Nota Saída</label><input id="ed-nsai"></div>
    <div class="ib iblue">⏱️ Tempo: <strong id="ed-tempo">--</strong> min</div>
    <button class="btn bp" id="bed" onclick="confirmarEdicao()">💾 Salvar</button>
    <button class="btn bs" onclick="closeEditModal()" style="margin-top:6px">❌ Cancelar</button>
  </div>
</div>

<script>
var FB = 'https://lion-416b7-default-rtdb.firebaseio.com';
var entradas = [];
var viagens  = [];
var filtro   = 'todos';
var modalIdx = -1;
var editIdx  = -1;
var _listaPend = [];
var _listaHist = [];

// ── FIREBASE ──────────────────────────────────────────────────────────
function fbGet(p, cb) {
  fetch(FB+'/'+p+'.json')
    .then(function(r){ return r.json(); })
    .then(function(d){ cb(null, d); })
    .catch(function(e){ cb(e, null); });
}
function fbPost(p, d, cb) {
  fetch(FB+'/'+p+'.json', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)})
    .then(function(r){ return r.json(); })
    .then(function(d){ cb(null, d); })
    .catch(function(e){ cb(e, null); });
}
function fbPut(p, d, cb) {
  fetch(FB+'/'+p+'.json', {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)})
    .then(function(r){ return r.json(); })
    .then(function(d){ cb(null, d); })
    .catch(function(e){ cb(e, null); });
}
function fbDelete(p, cb) {
  fetch(FB+'/'+p+'.json', {method:'DELETE'})
    .then(function(){ cb(null); })
    .catch(function(e){ cb(e); });
}

// ── SYNC ──────────────────────────────────────────────────────────────
function sync(s, m) {
  document.getElementById('sdot').className = 'dot '+s;
  document.getElementById('smsg').textContent = m;
}

function load(depois) {
  sync('busy','Carregando…');
  var got = {e:false, v:false, re:null, rv:null};
  function check() {
    if (!got.e || !got.v) return;
    entradas = got.re ? Object.keys(got.re).map(function(k){ var o=got.re[k]; o._key=k; return o; })
                          .sort(function(a,b){ return new Date(b.ts)-new Date(a.ts); }) : [];
    viagens  = got.rv ? Object.keys(got.rv).map(function(k){ var o=got.rv[k]; o._key=k; return o; })
                          .sort(function(a,b){ return new Date(b.ts)-new Date(a.ts); }) : [];
    sync('ok','Firebase ✓  '+viagens.length+' viagem(ns) · '+entradas.length+' em andamento');
    if (depois) depois();
  }
  fbGet('entradas', function(err, d){ got.e=true; got.re=err?null:d; check(); });
  fbGet('viagens',  function(err, d){ got.v=true; got.rv=err?null:d; check(); });
}

setInterval(function(){
  load(function(){
    var id = document.querySelector('.pane.on') ? document.querySelector('.pane.on').id : '';
    if(id==='sai') renderPend();
    if(id==='his') renderHist();
    if(id==='sta') renderStats();
  });
}, 15000);

// ── INIT ──────────────────────────────────────────────────────────────
document.getElementById('edata').value = hoje();
load(function(){ renderPend(); });

// ── TABS ──────────────────────────────────────────────────────────────
window.goTab = function(id, btn) {
  var ps = document.querySelectorAll('.pane');
  for(var i=0;i<ps.length;i++) ps[i].classList.remove('on');
  var bs = document.querySelectorAll('.tb');
  for(var i=0;i<bs.length;i++) bs[i].classList.remove('on');
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
  load(function(){
    if(id==='sai') renderPend();
    if(id==='his') renderHist();
    if(id==='sta') renderStats();
  });
};

// ── ALERT ─────────────────────────────────────────────────────────────
function alerta(cid, msg, tipo) {
  tipo = tipo || 'as';
  var el = document.getElementById(cid);
  el.innerHTML = '<div class="alert '+tipo+'">'+msg+'</div>';
  setTimeout(function(){ el.innerHTML=''; }, 4000);
}

// ── ENTRADA ───────────────────────────────────────────────────────────
window.registrarEntrada = function() {
  var placa = document.getElementById('eplaca').value.trim().toUpperCase();
  var data  = document.getElementById('edata').value;
  var hora  = document.getElementById('ehora').value;
  var nota  = document.getElementById('enota').value.trim();
  if(!placa){ alerta('aent','❌ Informe a placa','ae'); return; }
  if(!data) { alerta('aent','❌ Informe a data','ae');  return; }
  if(!hora) { alerta('aent','❌ Informe a hora','ae');  return; }
  setBusy('bentrada', true);
  fbPost('entradas', {placa:placa,data:data,hora:hora,nota:nota,ts:new Date().toISOString()}, function(err){
    setBusy('bentrada', false);
    if(err){ alerta('aent','❌ Erro: '+err.message,'ae'); return; }
    alerta('aent','✅ Entrada salva!');
    limparEntrada();
    load(function(){ renderPend(); });
  });
};

window.limparEntrada = function() {
  document.getElementById('eplaca').value='';
  document.getElementById('ehora').value='';
  document.getElementById('enota').value='';
  document.getElementById('edata').value=hoje();
};

// ── SAÍDA LIST ────────────────────────────────────────────────────────
function renderPend() {
  var q = (document.getElementById('ssai').value||'').toUpperCase();
  _listaPend = entradas.filter(function(e){ return !q || e.placa.indexOf(q)>=0; });
  var c = document.getElementById('pendlist');
  if(!_listaPend.length){ c.innerHTML='<div class="empty"><div class="ei">📭</div>Nenhum em andamento</div>'; return; }
  var html = '';
  for(var i=0; i<_listaPend.length; i++) {
    var e = _listaPend[i];
    var min = Math.round((Date.now()-new Date(e.ts))/60000);
    html += '<div class="card pend">'
      +'<div class="ch">'+e.placa+' <span class="badge bwarn">'+min+' min</span></div>'
      +'<div class="cg">'
      +'<div class="ci"><div class="cl">Chegada</div><div class="cv">'+e.data+' '+e.hora+'</div></div>'
      +'<div class="ci"><div class="cl">Aguardando</div><div class="cv">'+min+' min</div></div>'
      +'</div>'
      +(e.nota?'<div class="note">📝 '+e.nota+'</div>':'')
      +'<button class="btn bp" onclick="abrirSaida('+i+')" style="font-size:12px;padding:8px;margin-top:8px">📤 Registrar Saída</button>'
      +'<button class="btn bd" onclick="cancelarEntrada('+i+')" style="font-size:11px;padding:6px;margin-top:5px">🗑️ Cancelar</button>'
      +'</div>';
  }
  c.innerHTML = html;
}

window.abrirSaida = function(i) {
  var ent = _listaPend[i];
  if(!ent) return;
  modalIdx = i;
  document.getElementById('minfo').innerHTML = '<strong>'+ent.placa+'</strong> — Chegada: '+ent.data+' '+ent.hora;
  document.getElementById('mdata').value = ent.data;
  document.getElementById('mhora').value = '';
  document.getElementById('mpeso').value = '';
  document.getElementById('mnota').value = '';
  document.getElementById('mtempo').textContent = '--';
  function calc(){
    var ds=document.getElementById('mdata').value, hs=document.getElementById('mhora').value;
    if(ds&&hs){ var d=(new Date(ds+'T'+hs)-new Date(ent.data+'T'+ent.hora))/60000; document.getElementById('mtempo').textContent=d>=0?Math.round(d):'Inválido'; }
  }
  document.getElementById('mdata').oninput = calc;
  document.getElementById('mhora').oninput = calc;
  document.getElementById('msai').classList.add('open');
};

window.cancelarEntrada = function(i) {
  var ent = _listaPend[i];
  if(!ent) return;
  if(!confirm('Cancelar esta entrada?')) return;
  fbDelete('entradas/'+ent._key, function(err){
    if(err){ alerta('asai','❌ Erro: '+err.message,'ae'); return; }
    alerta('asai','✅ Entrada cancelada');
    load(function(){ renderPend(); });
  });
};

window.closeModal = function() { document.getElementById('msai').classList.remove('open'); modalIdx=-1; };

window.confirmarSaida = function() {
  var ent = _listaPend[modalIdx];
  if(!ent){ closeModal(); return; }
  var ds=document.getElementById('mdata').value, hs=document.getElementById('mhora').value;
  var peso=document.getElementById('mpeso').value, nota=document.getElementById('mnota').value.trim();
  if(!ds||!hs){ alerta('asai','❌ Informe data e hora','ae'); return; }
  var dtE=new Date(ent.data+'T'+ent.hora), dtS=new Date(ds+'T'+hs);
  if(dtS<=dtE){ alerta('asai','❌ Saída deve ser após chegada','ae'); return; }
  setBusy('bsai', true);
  var viagem = {placa:ent.placa,data_chegada:ent.data,hora_chegada:ent.hora,
    data_saida:ds,hora_saida:hs,peso_kg:peso?parseInt(peso):null,
    nota_entrada:ent.nota||'',nota_saida:nota,
    tempo_min:Math.round((dtS-dtE)/60000),ts:new Date().toISOString()};
  fbPost('viagens', viagem, function(err){
    if(err){ setBusy('bsai',false); alerta('asai','❌ Erro: '+err.message,'ae'); return; }
    fbDelete('entradas/'+ent._key, function(){
      setBusy('bsai', false);
      alerta('asai','✅ Saída registrada!');
      closeModal();
      load(function(){ renderPend(); });
    });
  });
};

// ── HISTÓRICO ─────────────────────────────────────────────────────────
window.setFil = function(f, btn) {
  filtro = f;
  var bs = document.querySelectorAll('.fb');
  for(var i=0;i<bs.length;i++) bs[i].classList.remove('on');
  btn.classList.add('on');
  document.getElementById('hist-date-box').style.display = f==='dia'?'block':'none';
  if(f!=='dia') document.getElementById('hist-data').value='';
  renderHist();
};

function filtrar(l) {
  var agora = Date.now();
  if(filtro==='hoje') return l.filter(function(v){ return new Date(v.ts).toDateString()===new Date().toDateString(); });
  if(filtro==='semana') return l.filter(function(v){ return (agora-new Date(v.ts))<=7*86400000; });
  if(filtro==='mes') return l.filter(function(v){ return (agora-new Date(v.ts))<=30*86400000; });
  if(filtro==='dia'){ var d=document.getElementById('hist-data').value; return d?l.filter(function(v){ return v.data_saida===d; }):l; }
  return l;
}

function renderHist() {
  var q = (document.getElementById('shis').value||'').toUpperCase();
  _listaHist = filtrar(viagens.filter(function(v){ return !q||v.placa.indexOf(q)>=0; }));
  var c = document.getElementById('histlist');
  if(!_listaHist.length){ c.innerHTML='<div class="empty"><div class="ei">📭</div>Nenhuma viagem</div>'; return; }
  var html = '';
  for(var i=0; i<_listaHist.length; i++) {
    var v = _listaHist[i];
    var tons = v.peso_kg?(v.peso_kg/1000).toFixed(2)+' t':'N/A';
    html += '<div class="card">'
      +'<div class="ch">'+v.placa+' <span class="badge bok">'+v.tempo_min+' min</span></div>'
      +'<div class="cg">'
      +'<div class="ci"><div class="cl">Chegada</div><div class="cv">'+v.data_chegada+' '+v.hora_chegada+'</div></div>'
      +'<div class="ci"><div class="cl">Saída</div><div class="cv">'+v.data_saida+' '+v.hora_saida+'</div></div>'
      +'<div class="ci"><div class="cl">Peso</div><div class="cv">'+tons+'</div></div>'
      +'<div class="ci"><div class="cl">Tempo</div><div class="cv">'+v.tempo_min+' min</div></div>'
      +'</div>'
      +(v.nota_entrada?'<div class="note">📥 '+v.nota_entrada+'</div>':'')
      +(v.nota_saida?'<div class="note">📤 '+v.nota_saida+'</div>':'')
      +'<div class="note">'+new Date(v.ts).toLocaleString('pt-BR')+'</div>'
      +'<div class="btn-row">'
      +'<button class="btn bp" onclick="abrirEdicao('+i+')" style="font-size:11px;padding:6px">✏️ Editar</button>'
      +'<button class="btn bd" onclick="deletarViagem('+i+')" style="font-size:11px;padding:6px">🗑️ Deletar</button>'
      +'</div>'
      +'</div>';
  }
  c.innerHTML = html;
}

window.abrirEdicao = function(i) {
  var v = _listaHist[i];
  if(!v) return;
  editIdx = i;
  document.getElementById('ed-placa').value = v.placa;
  document.getElementById('ed-dch').value   = v.data_chegada;
  document.getElementById('ed-hch').value   = v.hora_chegada;
  document.getElementById('ed-dsa').value   = v.data_saida;
  document.getElementById('ed-hsa').value   = v.hora_saida;
  document.getElementById('ed-peso').value  = v.peso_kg||'';
  document.getElementById('ed-nent').value  = v.nota_entrada||'';
  document.getElementById('ed-nsai').value  = v.nota_saida||'';
  function calc(){
    var dc=document.getElementById('ed-dch').value, hc=document.getElementById('ed-hch').value;
    var ds=document.getElementById('ed-dsa').value, hs=document.getElementById('ed-hsa').value;
    if(dc&&hc&&ds&&hs){ var d=(new Date(ds+'T'+hs)-new Date(dc+'T'+hc))/60000; document.getElementById('ed-tempo').textContent=d>=0?Math.round(d):'Inválido'; }
  }
  calc();
  document.getElementById('ed-dch').oninput = calc;
  document.getElementById('ed-hch').oninput = calc;
  document.getElementById('ed-dsa').oninput = calc;
  document.getElementById('ed-hsa').oninput = calc;
  document.getElementById('medit').classList.add('open');
};

window.closeEditModal = function() { document.getElementById('medit').classList.remove('open'); editIdx=-1; };

window.confirmarEdicao = function() {
  var v = _listaHist[editIdx];
  if(!v) return;
  var placa = document.getElementById('ed-placa').value.trim().toUpperCase();
  var dc=document.getElementById('ed-dch').value, hc=document.getElementById('ed-hch').value;
  var ds=document.getElementById('ed-dsa').value, hs=document.getElementById('ed-hsa').value;
  var peso=document.getElementById('ed-peso').value;
  var nent=document.getElementById('ed-nent').value.trim();
  var nsai=document.getElementById('ed-nsai').value.trim();
  if(!placa||!dc||!hc||!ds||!hs){ alert('Preencha todos os campos obrigatórios'); return; }
  var dtE=new Date(dc+'T'+hc), dtS=new Date(ds+'T'+hs);
  if(dtS<=dtE){ alert('Saída deve ser após chegada'); return; }
  setBusy('bed', true);
  var dados = {placa:placa,data_chegada:dc,hora_chegada:hc,data_saida:ds,hora_saida:hs,
    peso_kg:peso?parseInt(peso):null,nota_entrada:nent,nota_saida:nsai,
    tempo_min:Math.round((dtS-dtE)/60000),ts:v.ts};
  fbPut('viagens/'+v._key, dados, function(err){
    setBusy('bed', false);
    if(err){ alert('Erro ao salvar: '+err.message); return; }
    closeEditModal();
    load(function(){ renderHist(); renderStats(); });
  });
};

window.deletarViagem = function(i) {
  var v = _listaHist[i];
  if(!v) return;
  if(!confirm('Deletar esta viagem?')) return;
  fbDelete('viagens/'+v._key, function(err){
    if(err){ alert('Erro: '+err.message); return; }
    load(function(){ renderHist(); renderStats(); });
  });
};

// ── STATS ─────────────────────────────────────────────────────────────
function renderStats() {
  var c = document.getElementById('statsbox');
  var filtData = document.getElementById('stats-data').value;
  var lista = filtData ? viagens.filter(function(v){ return v.data_saida===filtData; }) : viagens;
  if(!lista.length){ c.innerHTML='<div class="empty"><div class="ei">📊</div>'+(filtData?'Nenhuma viagem neste dia':'Nenhum dado')+'</div>'; return; }
  var tot=lista.length, plcs=0, pesoTot=0, tTot=0;
  var cnt={}, rapida=lista[0], longa=lista[0];
  var placasSet = {};
  for(var i=0;i<lista.length;i++){
    var v=lista[i];
    placasSet[v.placa]=1;
    pesoTot += v.peso_kg||0;
    tTot += v.tempo_min;
    cnt[v.placa]=(cnt[v.placa]||0)+1;
    if(v.tempo_min<rapida.tempo_min) rapida=v;
    if(v.tempo_min>longa.tempo_min)  longa=v;
  }
  plcs = Object.keys(placasSet).length;
  var tmed = Math.round(tTot/tot);
  var topP='', topQ=0;
  var ckeys=Object.keys(cnt);
  for(var i=0;i<ckeys.length;i++){ if(cnt[ckeys[i]]>topQ){ topQ=cnt[ckeys[i]]; topP=ckeys[i]; } }
  var label = filtData ? '📅 '+new Date(filtData+'T12:00:00').toLocaleDateString('pt-BR') : 'Todos os dias';
  c.innerHTML = '<div class="ib iblue">'+label+'</div>'
    +'<div class="sg">'
    +'<div class="sc"><div class="sl">VIAGENS</div><div class="sv">'+tot+'</div></div>'
    +'<div class="sc"><div class="sl">PLACAS</div><div class="sv">'+plcs+'</div></div>'
    +'<div class="sc"><div class="sl">PESO TOTAL</div><div class="sv">'+(pesoTot/1000).toFixed(1)+'</div><div class="sl">ton</div></div>'
    +'<div class="sc"><div class="sl">TEMPO MÉDIO</div><div class="sv">'+tmed+'</div><div class="sl">min</div></div>'
    +'</div>'
    +'<div class="ib iblue">🏆 <strong>'+topP+'</strong> — '+topQ+' viagem'+(topQ>1?'s':'')+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
    +'<div style="background:#e8f5e9;border-left:4px solid #4caf50;padding:12px;border-radius:8px">'
    +'<div style="font-size:11px;color:#2e7d32;font-weight:600">⚡ MAIS RÁPIDA</div>'
    +'<div style="font-size:22px;font-weight:700;color:#2e7d32">'+rapida.tempo_min+' min</div>'
    +'<div style="font-size:11px;color:#555">'+rapida.placa+' · '+rapida.data_saida+'</div>'
    +'<div style="font-size:11px;color:#555">'+rapida.hora_chegada+' → '+rapida.hora_saida+'</div>'
    +'</div>'
    +'<div style="background:#fff3e0;border-left:4px solid #ff9800;padding:12px;border-radius:8px">'
    +'<div style="font-size:11px;color:#e65100;font-weight:600">🐢 MAIS LONGA</div>'
    +'<div style="font-size:22px;font-weight:700;color:#e65100">'+longa.tempo_min+' min</div>'
    +'<div style="font-size:11px;color:#555">'+longa.placa+' · '+longa.data_saida+'</div>'
    +'<div style="font-size:11px;color:#555">'+longa.hora_chegada+' → '+longa.hora_saida+'</div>'
    +'</div></div>';
}

// ── EXPORT ────────────────────────────────────────────────────────────
window.expCSV = function() {
  if(!viagens.length){ alert('Nenhum dado'); return; }
  var cols=['Placa','Data Chegada','Hora Chegada','Data Saída','Hora Saída','Peso (kg)','Tempo (min)','Nota Entrada','Nota Saída'];
  var rows=[cols.join(',')];
  for(var i=0;i<viagens.length;i++){
    var v=viagens[i];
    rows.push([v.placa,v.data_chegada,v.hora_chegada,v.data_saida,v.hora_saida,v.peso_kg||'',v.tempo_min,v.nota_entrada||'',v.nota_saida||''].map(function(c){return '"'+c+'"';}).join(','));
  }
  dl(new Blob([rows.join('\n')],{type:'text/csv;charset=utf-8;'}),'viagens_'+hoje()+'.csv');
};

window.expXLSX = function() {
  if(!viagens.length){ alert('Nenhum dado'); return; }
  var data=viagens.map(function(v){return{'Placa':v.placa,'Data Chegada':v.data_chegada,'Hora Chegada':v.hora_chegada,'Data Saída':v.data_saida,'Hora Saída':v.hora_saida,'Peso (kg)':v.peso_kg||'','Tempo (min)':v.tempo_min,'Nota Entrada':v.nota_entrada||'','Nota Saída':v.nota_saida||''};});
  var ws=XLSX.utils.json_to_sheet(data);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Viagens');
  XLSX.writeFile(wb,'viagens_'+hoje()+'.xlsx');
};

window.clearAll = function() {
  if(!confirm('Apagar TODOS os dados?')) return;
  if(!confirm('Tem certeza?')) return;
  fbDelete('entradas', function(){ fbDelete('viagens', function(){ load(function(){ renderPend(); renderHist(); renderStats(); }); }); });
};

function dl(blob,name){ var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); }
function hoje(){ return new Date().toISOString().split('T')[0]; }

function setBusy(id, busy) {
  var btn=document.getElementById(id);
  if(!btn) return;
  btn.disabled=busy;
  var labels={'bentrada':'✅ Registrar Entrada','bsai':'✅ Confirmar Saída','bed':'💾 Salvar'};
  btn.innerHTML=busy?'<span class="spin"></span>Salvando…':labels[id];
}
</script>
